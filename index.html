<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Mackenzie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen p-8">
    <div class="max-w-4xl mx-auto">
        
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-[#030213] mb-2">Livraria Mackenzie</h1>
        </div>

        <div id="banner-container"></div>

        <div class="bg-white rounded-xl shadow-sm p-6 mb-6 border border-gray-100" id="search-wrapper">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">Filtrar por Categoria</label>
                    <div class="relative">
                        <input type="text" id="search-input" placeholder="Ex: Horror, Tecnologia..." class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-600 outline-none transition-all">
                        <div id="custom-dropdown" class="absolute z-10 w-full mt-2 bg-white border border-gray-200 rounded-lg shadow-lg hidden max-h-60 overflow-auto"></div>
                    </div>
                </div>
                <div>
                    <label class="block mb-2 text-sm font-medium text-gray-700">Buscar por Título</label>
                    <input type="text" id="title-input" placeholder="Nome do livro..." class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-purple-600 outline-none transition-all">
                </div>
            </div>
            <div class="mt-4 flex gap-2">
                <button onclick="realizarBusca()" class="flex-1 bg-[#030213] text-white px-6 py-3 rounded-lg font-medium hover:opacity-90 transition-opacity">Aplicar Filtros</button>
                <button onclick="limparFiltros()" class="px-6 py-3 border border-gray-200 rounded-lg text-gray-500 hover:bg-gray-50 transition-colors text-center">Limpar</button>
            </div>
        </div>

        <div class="mb-4 px-2 text-sm text-gray-500 flex justify-between">
            <span id="contador-livros">0 livros encontrados</span>
        </div>

        <div id="lista-livros" class="grid gap-4">
            <div class="text-center py-10"><p class="text-gray-400">Carregando acervo...</p></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
